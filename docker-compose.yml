version: '3.9'

services:
  # ─── PostgreSQL (Source of Truth) ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ims_postgres
    environment:
      POSTGRES_DB: ims_db
      POSTGRES_USER: ims_user
      POSTGRES_PASSWORD: ims_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ims_user -d ims_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── MongoDB (Data Lake - Raw Signals) ─────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: ims_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Redis (Cache + BullMQ + TimeSeries) ───────────────────────────────────
  redis:
    image: redis/redis-stack:latest
    container_name: ims_redis
    ports:
      - "6379:6379"
      - "8001:8001"  # RedisInsight UI
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ims_backend
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ims_db
      POSTGRES_USER: ims_user
      POSTGRES_PASSWORD: ims_password
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: ims_signals
      REDIS_HOST: redis
      REDIS_PORT: 6379
      RATE_LIMIT_MAX: 10000
      RATE_LIMIT_WINDOW_MS: 1000
      DEBOUNCE_WINDOW_MS: 10000
      METRICS_INTERVAL_MS: 5000
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ims_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
